<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第二页 - 到达目的地</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #e9f0f9 0%, #cfdeed 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 3rem;
            box-shadow: 0 30px 45px rgba(25, 30, 50, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            padding: 3rem 4rem;
            text-align: center;
            max-width: 600px;
            width: 100%;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.01);
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 700;
            background: linear-gradient(145deg, #1b3b4f, #2b5c7c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.2rem;
            letter-spacing: -0.5px;
            text-shadow: 2px 4px 12px rgba(0,40,60,0.15);
        }

        p {
            font-size: 1.3rem;
            color: #1e3b4f;
            margin-bottom: 2.8rem;
            font-weight: 400;
            opacity: 0.9;
        }

        .back-button {
            display: inline-block;
            background: #2f5575;
            border: none;
            border-radius: 60px;
            padding: 1.2rem 3.5rem;
            font-size: 1.8rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            box-shadow: 0 20px 30px -8px #1d364b, 0 4px 0 0 #0e2230 inset, 0 -2px 10px rgba(255,255,255,0.3) inset;
            transition: all 0.15s ease;
            border: 1px solid rgba(255,255,255,0.3);
            line-height: 1;
            text-decoration: none;
        }

        .back-button:hover {
            background: #3c6a91;
            transform: translateY(-4px);
            box-shadow: 0 28px 35px -6px #203d55, 0 3px 0 0 #0e2230 inset, 0 -2px 12px white inset;
        }

        .back-button:active {
            transform: translateY(4px);
            box-shadow: 0 10px 20px -5px #172b39, 0 2px 0 0 #0e2230 inset;
        }

        .glow {
            position: fixed;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle at 20% 20%, rgba(210, 235, 255, 0.5), transparent 70%);
            border-radius: 50%;
            top: -80px;
            left: -70px;
            z-index: -1;
        }

        .glow2 {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle at 85% 90%, rgba(160, 210, 240, 0.45), transparent 70%);
            border-radius: 50%;
            bottom: -90px;
            right: -60px;
            z-index: -1;
        }

        .hint {
            margin-top: 2rem;
            font-size: 1.1rem;
            color: #345d7a;
            background: rgba(255,255,255,0.4);
            padding: 0.5rem 1.5rem;
            border-radius: 100px;
            display: inline-block;
            backdrop-filter: blur(4px);
        }

        footer {
            margin-top: 2.5rem;
            font-size: 0.9rem;
            color: #457197;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="glow2"></div>
    <main class="card">
        <h1>🌟 第二页</h1>
        <p>恭喜，你成功跳转到了这里！<br>想回去的话，按下面的按钮即可返回首页。</p>

        <!-- 返回按钮: 点击跳回 index.html (同一目录) -->
        <button class="back-button" id="backToIndex" onclick="location.href='index.html'">⬅️ 返回首页</button>

        <div class="hint">✨ 你已到达 page2.html</div>
        <footer>—— 你可以随时跳转回去 ——</footer>
    </main>

    <script>
        // 简单保证链接一致性，同时保留onclick
        (function() {
            const backBtn = document.getElementById('backToIndex');
            if(backBtn) {
                // 除了onclick属性，也加个监听（不冲突，依然跳转）
                backBtn.addEventListener('click', function(e) {
                    // 无需额外操作，onclick已经做了location.href
                });
            }
        })();
    </script>
</body>
</html>
